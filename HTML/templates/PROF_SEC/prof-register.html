<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professors Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='PROF_SEC/prof-register.css') }}">
</head>
<body>
    <header>
        <img id="logo" src="{{ url_for('static', filename='logo.jpg') }}" alt="logo">
        <div id="headline">Edu Portal</div>
        <div id="quote">Bridging the gap between knowledge givers and knowledge seekers.</div>
    </header>

    <div class="loginbox">
        <h2>Professor Registration</h2>

        <form action="/prof_register" method="POST">
            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username" placeholder="Enter username" required><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter email" required><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" placeholder="Enter password" required><br>

            <button type="submit">Register</button>
        </form>

        <div id="lastLine">
            <h5>Already have an account?</h5>
            <a href="{{ url_for('prof_login') }}"><p>Login here!</p></a>
        </div>
    </div>
</body>
</html>
